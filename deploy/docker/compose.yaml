name: opentrip

services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-opentrip}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opentrip}
            POSTGRES_DB: ${POSTGRES_DB:-opentrip}
        volumes:
            - opentrip-pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opentrip}"]
            interval: 5s
            timeout: 5s
            retries: 10
        ports:
            - "${POSTGRES_PORT:-5430}:5432"

    api:
        build:
            context: ../..
            dockerfile: deploy/docker/api.Dockerfile
        environment:
            DATABASE_URL: postgres://${POSTGRES_USER:-opentrip}:${POSTGRES_PASSWORD:-opentrip}@postgres:5432/${POSTGRES_DB:-opentrip}
            BASE_URL: ${BASE_URL:-http://localhost:8090}
            BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
            TRUSTED_ORIGINS: ${WEB_ORIGIN:-http://localhost:8090}
            GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
            STORAGE_BACKEND: ${STORAGE_BACKEND:-fs}
            STORAGE_ROOT: ${STORAGE_ROOT:-/app/apps/api/uploads}
            AI_PROVIDER: ${AI_PROVIDER:-openai}
            AI_MODEL: ${AI_MODEL}
            AI_BASE_URL: ${AI_BASE_URL}
            AI_API_KEY: ${AI_API_KEY}
            AI_PROACTIVE_THRESHOLD: ${AI_PROACTIVE_THRESHOLD:-0.7}
            AI_MAX_TOOL_STEPS: ${AI_MAX_TOOL_STEPS:-5}
            PORT: "8780"
        volumes:
            - opentrip-uploads:/app/apps/api/uploads
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:8780/api/health || exit 1",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        ports:
            - "8780:8780"

    web:
        build:
            context: ../..
            dockerfile: deploy/docker/web.Dockerfile
            args:
                # Browser-visible origin; nginx proxies /api to the api service.
                BASE_URL: ${BASE_URL:-http://localhost:8090}
        depends_on:
            - api
        ports:
            - "8090:80"

volumes:
    opentrip-pgdata:
    opentrip-uploads:
