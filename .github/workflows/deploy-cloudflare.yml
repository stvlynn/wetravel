# Deploy OpenTrip to Cloudflare on push to main.
# - Pages (SPA) → opentrip.im / opentrip-web.pages.dev
# - Workers (API) → api.opentrip.im
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Worker secrets synced when present (never commit values):
#   DATABASE_URL (MySQL/Postgres direct connect when Hyperdrive is unused),
#   BETTER_AUTH_SECRET, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY,
#   AI_API_KEY, OPENWEATHERMAP_API_KEY, GOOGLE_CLIENT_ID,
#   GOOGLE_CLIENT_SECRET, GOOGLE_MAPS_API_KEY, CAPTCHA_SECRET_KEY
#
# Optional repository Variables (Settings → Secrets and variables → Actions → Variables):
#   DB_INIT_ON_START=true  — one-shot: CREATE DATABASE + apply MySQL schema during deploy
#   DB_INIT_SEED=true      — also run seed when init runs
# Turn DB_INIT_ON_START back to false (or delete) after a successful init.

name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Deploy API Worker"
        type: boolean
        default: true
      deploy_web:
        description: "Deploy Pages frontend"
        type: boolean
        default: true
      sync_secrets:
        description: "Sync GitHub secrets → Worker secrets after API deploy"
        type: boolean
        default: true
      init_db:
        description: "One-shot MySQL init (CREATE DATABASE + schema)"
        type: boolean
        default: false

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-web:
    name: Pages (opentrip-web)
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_web)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          API_ORIGIN: https://api.opentrip.im
          PAGES_BRANCH: main
        run: node deploy/cloudflare/scripts/deploy-web.mjs

  deploy-api:
    name: Workers (opentrip-api)
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_api)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace deps (wrangler bundle needs package resolution)
        run: pnpm install --frozen-lockfile

      - name: Init MySQL (CREATE DATABASE + schema)
        # Prefer repository Variable DB_INIT_ON_START=true for one deploy, then set false.
        # Or check "init_db" when manually running the workflow.
        if: >-
          vars.DB_INIT_ON_START == 'true' ||
          vars.DB_INIT_ON_START == '1' ||
          github.event.inputs.init_db == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_PROVIDER: mysql
          DATABASE_SSL: ${{ vars.DATABASE_SSL || 'off' }}
          DB_INIT_SEED: ${{ vars.DB_INIT_SEED || 'false' }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::DATABASE_URL repository secret is required for DB init"
            exit 1
          fi
          echo "Running MySQL init (DB_INIT_ON_START / init_db)…"
          pnpm --filter @opentrip/api db:mysql-init
          echo "Init finished. Set repository variable DB_INIT_ON_START=false before the next deploy."

      - name: Deploy API Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node deploy/cloudflare/scripts/deploy-api.mjs

      - name: Sync Worker secrets from GitHub secrets
        if: github.event_name == 'push' || inputs.sync_secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          CAPTCHA_SECRET_KEY: ${{ secrets.CAPTCHA_SECRET_KEY }}
        run: node deploy/cloudflare/scripts/sync-secrets.mjs --from-env
