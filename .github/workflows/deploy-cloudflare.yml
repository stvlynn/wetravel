# Deploy OpenTrip to Cloudflare on push to main.
# - Pages (SPA) → opentrip.im / opentrip-web.pages.dev
# - Workers (API) → api.opentrip.im
#
# All runtime configuration is managed in GitHub Actions:
#   Secrets  → Worker secrets (sync-secrets) + Pages build public keys
#   Variables → Worker vars (deploy-api overlay) + Pages build flags
#
# Required secrets:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   HYPERDRIVE_ID — Hyperdrive config id (deploy inject only; never commit)
#   HYPERDRIVE_CACHE_DISABLED_ID — cache-disabled Hyperdrive for auth/agent fresh reads
#   DATABASE_URL  — origin Postgres URL for CI migrations only (not Worker runtime)
#   BETTER_AUTH_SECRET
#
# Auth / email / captcha (production):
#   Secrets: CAPTCHA_SECRET_KEY, TURNSTILE_SITE_KEY, RESEND_API_KEY,
#            GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
#            WECHAT_WEB_APP_ID, WECHAT_WEB_APP_SECRET,
#            WECHAT_MINI_PROGRAM_APP_ID, WECHAT_MINI_PROGRAM_APP_SECRET
#   Vars:    CAPTCHA_PROVIDER, EMAIL_PROVIDER, EMAIL_FROM, API_BASE_URL,
#            TRUSTED_ORIGINS
#
# Optional: AI_API_KEY, MAPILLARY_ACCESS_TOKEN, OPENWEATHERMAP_API_KEY,
#           GOOGLE_MAPS_API_KEY, UNSPLASH_ACCESS_KEY + matching vars.

name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Deploy API Worker"
        type: boolean
        default: true
      deploy_web:
        description: "Deploy Pages frontend"
        type: boolean
        default: true
      sync_secrets:
        description: "Sync GitHub secrets → Worker secrets after API deploy"
        type: boolean
        default: true
      skip_migrate:
        description: "Skip database migrate (emergency only)"
        type: boolean
        default: false
      seed_db:
        description: "Also run demo seed after migrate"
        type: boolean
        default: false

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-web:
    name: Pages (opentrip-web)
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_web)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          API_ORIGIN: ${{ vars.API_BASE_URL }}
          PAGES_BRANCH: main
          # Public captcha site key is baked into the SPA; secret stays on the Worker.
          CAPTCHA_PROVIDER: ${{ vars.CAPTCHA_PROVIDER }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: node deploy/cloudflare/scripts/deploy-web.mjs

  deploy-api:
    name: Workers (opentrip-api)
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_api)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace deps (wrangler bundle needs package resolution)
        run: pnpm install --frozen-lockfile

      # Best practice: migrate on origin DATABASE_URL in CI, then deploy Worker
      # which talks to the same DB via Hyperdrive (no DATABASE_URL needed at runtime).
      - name: Migrate database (prisma migrate deploy)
        if: >-
          github.event.inputs.skip_migrate != 'true' &&
          vars.SKIP_DB_MIGRATE != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_PROVIDER: ${{ vars.DATABASE_PROVIDER }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::Set repository secret DATABASE_URL to the PlanetScale/origin Postgres URL (used only for CI migrate, not Worker runtime)."
            exit 1
          fi
          PROVIDER="${DATABASE_PROVIDER:-postgres}"
          echo "Applying pending migrations (provider=$PROVIDER)…"
          if [ "$PROVIDER" = "mysql" ]; then
            pnpm --filter @opentrip/api db:mysql-init
          else
            pnpm --filter @opentrip/api db:migrate
          fi

      - name: Seed database (optional)
        if: >-
          github.event.inputs.seed_db == 'true' ||
          vars.DB_INIT_SEED == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_PROVIDER: ${{ vars.DATABASE_PROVIDER }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::DATABASE_URL is required for seed"
            exit 1
          fi
          pnpm --filter @opentrip/api db:seed

      - name: Deploy API Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Injected into wrangler at deploy time — never committed
          HYPERDRIVE_ID: ${{ secrets.HYPERDRIVE_ID }}
          HYPERDRIVE_CACHE_DISABLED_ID: ${{ secrets.HYPERDRIVE_CACHE_DISABLED_ID }}
          # Non-secret Worker vars (overlay wrangler.api.jsonc defaults)
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          TRUSTED_ORIGINS: ${{ vars.TRUSTED_ORIGINS }}
          DATABASE_PROVIDER: ${{ vars.DATABASE_PROVIDER }}
          DATABASE_SSL: ${{ vars.DATABASE_SSL }}
          STORAGE_BACKEND: ${{ vars.STORAGE_BACKEND }}
          STORAGE_ROOT: ${{ vars.STORAGE_ROOT }}
          STORAGE_PUBLIC_URL: ${{ vars.STORAGE_PUBLIC_URL }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_REGION: ${{ vars.S3_REGION }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_FORCE_PATH_STYLE: ${{ vars.S3_FORCE_PATH_STYLE }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_PROACTIVE_THRESHOLD: ${{ vars.AI_PROACTIVE_THRESHOLD }}
          AI_MAX_TOOL_STEPS: ${{ vars.AI_MAX_TOOL_STEPS }}
          AI_TELEMETRY_RECORD_CONTENT: ${{ vars.AI_TELEMETRY_RECORD_CONTENT }}
          SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          STREET_VIEW_PROVIDER: ${{ vars.STREET_VIEW_PROVIDER }}
          STREET_VIEW_TIMEOUT_MS: ${{ vars.STREET_VIEW_TIMEOUT_MS }}
          GEO_PROVIDER: ${{ vars.GEO_PROVIDER }}
          GEO_OSM_USER_AGENT: ${{ vars.GEO_OSM_USER_AGENT }}
          GEO_OSM_NOMINATIM_URL: ${{ vars.GEO_OSM_NOMINATIM_URL }}
          GEO_OSM_OVERPASS_URL: ${{ vars.GEO_OSM_OVERPASS_URL }}
          GEO_OSM_OSRM_URL: ${{ vars.GEO_OSM_OSRM_URL }}
          GEO_TIMEOUT_MS: ${{ vars.GEO_TIMEOUT_MS }}
          GEO_CACHE_TTL_MS: ${{ vars.GEO_CACHE_TTL_MS }}
          EMAIL_PROVIDER: ${{ vars.EMAIL_PROVIDER }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          CAPTCHA_PROVIDER: ${{ vars.CAPTCHA_PROVIDER }}
        run: node deploy/cloudflare/scripts/deploy-api.mjs

      - name: Sync Worker secrets from GitHub secrets
        if: github.event_name == 'push' || inputs.sync_secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Intentionally NOT syncing DATABASE_URL to Worker when using Hyperdrive.
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          MAPILLARY_ACCESS_TOKEN: ${{ secrets.MAPILLARY_ACCESS_TOKEN }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          WECHAT_WEB_APP_ID: ${{ secrets.WECHAT_WEB_APP_ID }}
          WECHAT_WEB_APP_SECRET: ${{ secrets.WECHAT_WEB_APP_SECRET }}
          WECHAT_MINI_PROGRAM_APP_ID: ${{ secrets.WECHAT_MINI_PROGRAM_APP_ID }}
          WECHAT_MINI_PROGRAM_APP_SECRET: ${{ secrets.WECHAT_MINI_PROGRAM_APP_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          CAPTCHA_SECRET_KEY: ${{ secrets.CAPTCHA_SECRET_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: node deploy/cloudflare/scripts/sync-secrets.mjs --from-env
